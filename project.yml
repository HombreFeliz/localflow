name: LocalFlow

options:
  bundleIdPrefix: com.localflow
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: 0.9.0
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 2.0.0

targets:
  LocalFlow:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: LocalFlow
        excludes:
          - Resources/LocalFlow.entitlements
    resources:
      - path: LocalFlow/Resources/Assets.xcassets
    entitlements:
      path: LocalFlow/Resources/LocalFlow.entitlements
    info:
      path: LocalFlow/Resources/Info.plist
      properties:
        CFBundleDisplayName: LocalFlow
        CFBundleIdentifier: com.localflow.app
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSUIElement: true
        NSMicrophoneUsageDescription: "LocalFlow graba tu voz para transcribir a texto."
        NSAppleEventsUsageDescription: "LocalFlow necesita Accesibilidad para insertar texto transcrito."
        NSHumanReadableCopyright: "© 2025 LocalFlow"
        CFBundleIconName: AppIcon
    settings:
      base:
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_APP_SANDBOX: NO
        CODE_SIGN_STYLE: Manual
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        ENABLE_HARDENED_RUNTIME: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.localflow.app
        PRODUCT_NAME: LocalFlow
        SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        OTHER_SWIFT_FLAGS: ""
        SWIFT_STRICT_CONCURRENCY: minimal
    dependencies:
      - package: WhisperKit
        product: WhisperKit
      - package: KeyboardShortcuts
        product: KeyboardShortcuts
